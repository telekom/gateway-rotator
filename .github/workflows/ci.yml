name: CI

# Required vars:
# - REGISTRY_HOST: e.g. mtr.devops.telekom.de
# - REGISTRY_REPO: e.g. /tardis-internal/gateway/rotator
# - REGISTRY_USER: Name of MTR robot user
#
# Required secrets:
# - REGISTRY_AUTH_TOKEN: MTR robot token
# - COSIGN_PASSWORD: Passphrase for the cosign private key
# - COSIGN_PRIVATE_KEY: Private key used for image signing
# - COSIGN_PUBLIC_KEY: Public key used for signature verification

on:
  pull_request:
  workflow_dispatch:
    inputs:
      release_version:
        description: "The next release version"
        type: string
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  # ------------
  # Linting Jobs
  # ------------
  lint-go:
    name: Lint Go code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 #v6.3.0
        with:
          go-version-file: go.mod
      - name: Run linter
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 #v9.2.0

  lint-reuse:
    name: Check REUSE compliance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      - name: REUSE Compliance Check
        uses: fsfe/reuse-action@676e2d560c9a403aa252096d99fcab3e1132b0f5 #v6.0.0

  check-generated-changes:
    name: Check generated code is up-to-date
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      - name: Restore Go cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 #v5.0.4
        with:
          path: |
            ~/.cache/go-build
            ~/.go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
      - name: Generate manifests
        run: make manifests
      - name: Generate boilerplate
        run: make generate
      - name: Ensure nothing has changed
        run: git diff --exit-code -- . ':!go.sum' ':!go.mod'

  check-changes:
    name: Check which files changed
    runs-on: ubuntu-latest
    # Required permissions
    permissions:
      pull-requests: read
      contents: read
    # Set job outputs to values from filter step
    outputs:
      deps: ${{ steps.filter.outputs.deps }}
    steps:
      - name: Checkout project
        if: github.event_name != 'pull_request' # Checkout not necessary for PRs
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d #v4.0.1
        id: filter
        with:
          filters: |
            deps:
              - 'go.sum'

  ort:
    name: ORT scan
    runs-on: ubuntu-latest
    needs:
      - check-changes
    #if: ${{ needs.check-changes.outputs.deps == 'true' }} # Only run if deps have changed
    steps:
      - name: Use HTTPS for Git cloning
        run: git config --global url.https://github.com/.insteadOf ssh://git@github.com/
      - name: Checkout project
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      - name: Prepare ORT config
        # This allows us to customize the default ORT config available at
        # https://github.com/oss-review-toolkit/ort-config
        # using our own config file stored in .github/ort/config.yml
        # Note that this is the global config, not the repo specific one
        run: |
          # Move into default config dir
          export ORT_CONFIG_DIR=$HOME/.ort/config
          mkdir -p ${ORT_CONFIG_DIR}
          cd ${ORT_CONFIG_DIR}
          # Checkout default config repo
          git init -q
          git remote add origin https://github.com/oss-review-toolkit/ort-config.git
          git fetch -q --depth 1 origin main
          git checkout -q FETCH_HEAD
          # Copy custom config into config dir
          cp ${GITHUB_WORKSPACE}/.github/ort/config.yml ${ORT_CONFIG_DIR}
      - name: Run GitHub Action for ORT
        uses: oss-review-toolkit/ort-ci-github-action@15444ef12061233721b86e4f36b90717c4e266b5 #commit on master including full sha pins for transitive actions
        with:
          fail-on: violations
          docker-cli-args: >-
            -e ORT_ARTIFACTORY_TOKEN=${{ secrets.ORT_ARTIFACTORY_TOKEN }}
          run: >
            cache-dependencies,
            cache-scan-results,
            labels,
            analyzer,
            scanner,
            advisor,
            evaluator,
            reporter,
            upload-results

  # ----------
  # Build jobs
  # ----------
  build-go:
    name: Build Go code
    runs-on: ubuntu-latest
    outputs:
      go-version: ${{ steps.setup-go.outputs.go-version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      - name: Setup Go
        id: setup-go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 #v6.3.0
        with:
          go-version-file: go.mod
      - name: Restore Go cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 #v5.0.4
        with:
          path: |
            ~/.cache/go-build
            ~/.go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
      - name: Download all Go modules
        run: |
          go mod download
      - name: Build
        run: go build ./cmd/main.go

  # ---------
  # Test jobs
  # ---------
  govulncheck:
    # this also scans dependencies
    name: Check for vulnerabilities (govulncheck)
    runs-on: ubuntu-latest
    needs:
      - build-go
    steps:
      - id: govulncheck
        uses: golang/govulncheck-action@31f7c5463448f83528bd771c2d978d940080c9fd #master on 20260325 contains full commit SHAs
        with:
          go-version-input: '' # default is 'stable' which overrides the file input
          go-version-file: go.mod
          go-package: ./...

  test-go-unit:
    name: Run unit tests
    runs-on: ubuntu-latest
    needs:
      - build-go
    permissions:
      pull-requests: write
      checks: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 #v6.3.0
        with:
          go-version-file: go.mod
      - name: Restore Go cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 #v5.0.4
        with:
          path: |
            ~/.cache/go-build
            ~/.go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
      - name: Setup envtest
        run: make setup-envtest
      - name: Run tests
        run: make test-ci
      - name: Generate HTML coverage report
        run: go tool cover -html=cover.profile -o coverage.html
      - name: Generate Cobertura coverage report
        run: |
          go install github.com/boumenot/gocover-cobertura@latest
          gocover-cobertura < cover.profile > cobertura.xml
      - id: upload-results
        name: Upload test results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f #v7.0.0
        with:
          name: test-report
          path: |
            ./cover.profile
            ./coverage.html
            ./cobertura.xml
            ./junit.xml
      - name: Publish test report
        uses: mikepenz/action-junit-report@49b2ca06f62aa7ef83ae6769a2179271e160d8e4 #v6.3.1
        if: always() && github.event_name == 'pull_request'
        with:
          report_paths: './junit.xml'
          check_name: Test Report
          comment: true
          include_passed: true
      - name: Prepare coverage comment
        uses: irongut/CodeCoverageSummary@51cc3a756ddcd398d447c044c02cb6aa83fdae95 #v1.3.0
        if: always() && github.event_name == 'pull_request'
        with:
          filename: ./cobertura.xml
          badge: true
          fail_below_min: true
          format: markdown
          indicators: true
          output: both
          thresholds: '60 80'
      - name: Append coverage comment
        if: always() && github.event_name == 'pull_request'
        run: |
          sudo chown $(whoami) code-coverage-results.md
          printf "\nDownload the latest HTML coverage report [here](${{ steps.upload-results.outputs.artifact-url }})." >> code-coverage-results.md
      - name: Add Coverage PR Comment
        uses: marocchino/sticky-pull-request-comment@70d2764d1a7d5d9560b100cbea0077fc8f633987 #v3.0.2
        if: always() && github.event_name == 'pull_request'
        with:
          recreate: true
          path: code-coverage-results.md

  test-go-e2e:
    name: Run E2E tests
    runs-on: ubuntu-latest
    needs:
      - build-go
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 #v6.3.0
        with:
          go-version-file: go.mod
      - name: Restore Go cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 #v5.0.4
        with:
          path: |
            ~/.cache/go-build
            ~/.go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
      - name: Install the latest version of kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
      - name: Verify kind installation
        run: kind version
      - name: Create kind cluster
        run: kind create cluster
      - name: Run tests
        run: make test-e2e-ci

  # ---------
  # Image jobs
  # ---------
  build-push-image:
    name: Build & push image to MTR
    runs-on: ubuntu-latest
    needs:
      - build-go
      - test-go-unit
      - test-go-e2e
    outputs:
      image-digest: ${{ steps.build-push.outputs.digest }}
      image-tag: ${{ steps.tag.outputs.image-tag }}
    steps:
      - name: Inject slug vars
        uses: rlespinasse/github-slug-action@9e7def61550737ba68c62d34a32dd31792e3f429 #v5.5.0
      - name: Determine tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "This workflow was triggered by workflow_dispatch."
            export TAG=${{ github.event.inputs.release_version }}
          else
            if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
              echo "This workflow was triggered by a tag push ${GITHUB_REF}"
              export TAG=$(echo ${GITHUB_REF} | sed 's|^refs/tags/v||')
            else
              if [[ "${GITHUB_REF_POINT_SLUG}" == "main" ]]; then
                export TAG="latest"
              else
                export TAG=${GITHUB_REF_POINT_SLUG}
              fi
            fi
          fi
          echo "Image tag will be: ${TAG}"
          echo "image-tag=${TAG}" >> "${GITHUB_OUTPUT}"
      - name: Determine image labels
        # Apply Quay expiry only to branch builds that are not main; tags stay permanent.
        id: image-labels
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "labels=" >> "${GITHUB_OUTPUT}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "labels=" >> "${GITHUB_OUTPUT}"
          else
            echo "labels=quay.expires-after=60d" >> "${GITHUB_OUTPUT}"
          fi
      - name: Login to registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 #v3.7.0
        with:
          registry: ${{ vars.REGISTRY_HOST }}
          username: ${{ vars.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_AUTH_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a #v4.0.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f #v3.12.0
      - name: Build and push
        id: build-push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 #v6.19.2
        env:
          DOCKER_BUILD_SUMMARY: false
        with:
          tags: ${{ vars.REGISTRY_HOST }}${{ vars.REGISTRY_REPO }}:${{ steps.tag.outputs.image-tag }}
          cache-from: type=registry,ref=${{ vars.REGISTRY_HOST }}${{ vars.REGISTRY_REPO }}:latest
          cache-to: type=inline
          build-args: GO_VERSION=${{ needs.build-go.outputs.go-version }}
          provenance: false
          labels: ${{ steps.image-labels.outputs.labels }}
          push: true
          platforms: linux/amd64,linux/arm64

  scan-image:
    name: Scan image
    runs-on: ubuntu-latest
    needs:
      - build-push-image
    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 #v0.35.0
        env:
          TRIVY_USERNAME: ${{ vars.REGISTRY_USER }}
          TRIVY_PASSWORD: ${{ secrets.REGISTRY_AUTH_TOKEN }}
        with:
          image-ref: '${{ vars.REGISTRY_HOST }}${{ vars.REGISTRY_REPO }}@${{ needs.build-push-image.outputs.image-digest }}'
          exit-code: '1'
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  sign-image:
    name: Sign image
    runs-on: ubuntu-latest
    needs:
      - build-push-image
      - scan-image
      - govulncheck
    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad #v4.0.0
        with:
          cosign-release: 'v2.5.3'
      - name: Sign image using cosign
        id: cosign-sign
        run: |
          echo "TAGS=${TAGS}"
          echo "DIGEST=${DIGEST}"
          images=""
          for tag in ${TAGS}; do
            images+="${REGISTRY}${REGISTRY_REPO}:${tag}@${DIGEST} "
          done
          echo "images=${images}" >> $GITHUB_OUTPUT
          cosign login -u ${REGISTRY_USER} -p ${REGISTRY_PASSWORD} ${REGISTRY}
          cosign sign --key env://COSIGN_PRIVATE_KEY --tlog-upload=false ${images}
        env:
          TAGS: ${{ needs.build-push-image.outputs.image-tag }}
          DIGEST: ${{ needs.build-push-image.outputs.image-digest }}
          REGISTRY: ${{ vars.REGISTRY_HOST }}
          REGISTRY_REPO: ${{ vars.REGISTRY_REPO }}
          REGISTRY_USER: ${{ vars.REGISTRY_USER }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_AUTH_TOKEN }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
      - name: Verify signature
        run: |
          cosign verify --insecure-ignore-tlog=true --key env://COSIGN_PUBLIC_KEY ${IMAGES}
        env:
          IMAGES: ${{ steps.cosign-sign.outputs.images }}
          COSIGN_PUBLIC_KEY: ${{ secrets.COSIGN_PUBLIC_KEY }}
